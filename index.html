/* ✅ FIXED: Flex goes on the container, not the links */
.link-stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;   /* forces all children (links) to the left edge */
  text-align: left;
}

.link-stack a {
  /* ✅ FIXED: Remove flex, use block display for proper underline width */
  display: block;            /* or inline-block; block ensures full width of container */
  background: none;
  border: none;
  padding: 0;
  font-size: 1.2rem;
  color: #fff;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  transition: text-shadow 0.2s ease;
  margin-bottom: 8px;        /* optional spacing between stacked links */
}

/* White glow on hover */
.link-stack a:hover {
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.9),
               0 0 18px rgba(255, 255, 255, 0.5);
}

/* Gradient underline */
.link-stack a::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, #ffffff, #c0c0c0, #888888);
  background-size: 200% 100%;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.link-stack a:hover::after {
  transform: scaleX(1);
}

.link-stack a:focus-visible {
  outline: 2px solid #a0c0ff;
  outline-offset: 4px;
  border-radius: 2px;
}

/* Logo left alignment (optional, already left by default) */

  width: 100px;

(function oneko() {
  const isReducedMotion =
    window.matchMedia(`(prefers-reduced-motion: reduce)`) === true ||
    window.matchMedia(`(prefers-reduced-motion: reduce)`).matches === true;

  if (isReducedMotion) return;

  const nekoEl = document.createElement('div');
  let persistPosition = true;

  let nekoPosX = 32;
  let nekoPosY = 32;

  let mousePosX = 0;
  let mousePosY = 0;

  let frameCount = 0;
  let idleTime = 0;
  let idleAnimation = null;
  let idleAnimationFrame = 0;

  const nekoSpeed = 10;
  const spriteSets = {
    idle: [[-3, -3]],
    alert: [[-7, -3]],
    scratchSelf: [
      [-5, 0],
      [-6, 0],
      [-7, 0],
    ],
    scratchWallN: [
      [0, 0],
      [0, -1],
    ],
    scratchWallS: [
      [-7, -1],
      [-6, -2],
    ],
    scratchWallE: [
      [-2, -2],
      [-2, -3],
    ],
    scratchWallW: [
      [-4, 0],
      [-4, -1],
    ],
    tired: [[-3, -2]],
    sleeping: [
      [-2, 0],
      [-2, -1],
    ],
    N: [
      [-1, -2],
      [-1, -3],
    ],
    NE: [
      [0, -2],
      [0, -3],
    ],
    E: [
      [-3, 0],
      [-3, -1],
    ],
    SE: [
      [-5, -1],
      [-5, -2],
    ],
    S: [
      [-6, -3],
      [-7, -2],
    ],
    SW: [
      [-5, -3],
      [-6, -1],
    ],
    W: [
      [-4, -2],
      [-4, -3],
    ],
    NW: [
      [-1, 0],
      [-1, -1],
    ],
  };

  function init() {
    let nekoFile = './oneko.gif';
    const curScript = document.currentScript;
    if (curScript && curScript.dataset.cat) {
      nekoFile = curScript.dataset.cat;
    }
    if (curScript && curScript.dataset.persistPosition) {
      if (curScript.dataset.persistPosition === '') {
        persistPosition = true;
      } else {
        persistPosition = JSON.parse(
          curScript.dataset.persistPosition.toLowerCase(),
        );
      }
    }

    if (persistPosition) {
      let storedNeko = JSON.parse(window.localStorage.getItem('oneko'));
      if (storedNeko !== null) {
        nekoPosX = storedNeko.nekoPosX;
        nekoPosY = storedNeko.nekoPosY;
        mousePosX = storedNeko.mousePosX;
        mousePosY = storedNeko.mousePosY;
        frameCount = storedNeko.frameCount;
        idleTime = storedNeko.idleTime;
        idleAnimation = storedNeko.idleAnimation;
        idleAnimationFrame = storedNeko.idleAnimationFrame;
        nekoEl.style.backgroundPosition = storedNeko.bgPos;
      }
    }

    nekoEl.id = 'oneko';
    nekoEl.ariaHidden = true;
    nekoEl.style.width = '32px';
    nekoEl.style.height = '32px';
    nekoEl.style.position = 'fixed';
    nekoEl.style.pointerEvents = 'none';
    nekoEl.style.imageRendering = 'pixelated';
    nekoEl.style.left = `${nekoPosX - 16}px`;
    nekoEl.style.top = `${nekoPosY - 16}px`;
    nekoEl.style.zIndex = 2147483647;

    nekoEl.style.backgroundImage = `url(${nekoFile})`;

    document.body.appendChild(nekoEl);

    document.addEventListener('mousemove', function (event) {
      mousePosX = event.clientX;
      mousePosY = event.clientY;
    });

    if (persistPosition) {
      window.addEventListener('beforeunload', function (event) {
        window.localStorage.setItem(
          'oneko',
          JSON.stringify({
            nekoPosX: nekoPosX,
            nekoPosY: nekoPosY,
            mousePosX: mousePosX,
            mousePosY: mousePosY,
            frameCount: frameCount,
            idleTime: idleTime,
            idleAnimation: idleAnimation,
            idleAnimationFrame: idleAnimationFrame,
            bgPos: nekoEl.style.backgroundPosition,
          }),
        );
      });
    }

    window.requestAnimationFrame(onAnimationFrame);
  }

  let lastFrameTimestamp;

  function onAnimationFrame(timestamp) {
    // Stops execution if the neko element is removed from DOM
    if (!nekoEl.isConnected) {
      return;
    }
    if (!lastFrameTimestamp) {
      lastFrameTimestamp = timestamp;
    }
    if (timestamp - lastFrameTimestamp > 100) {
      lastFrameTimestamp = timestamp;
      frame();
    }
    window.requestAnimationFrame(onAnimationFrame);
  }

  function setSprite(name, frame) {
    const sprite = spriteSets[name][frame % spriteSets[name].length];
    nekoEl.style.backgroundPosition = `${sprite[0] * 32}px ${sprite[1] * 32}px`;
  }

  function resetIdleAnimation() {
    idleAnimation = null;
    idleAnimationFrame = 0;
  }

  function idle() {
    idleTime += 1;

    // every ~ 20 seconds
    if (
      idleTime > 10 &&
      Math.floor(Math.random() * 200) == 0 &&
      idleAnimation == null
    ) {
      let avalibleIdleAnimations = ['sleeping', 'scratchSelf'];
      if (nekoPosX < 32) {
        avalibleIdleAnimations.push('scratchWallW');
      }
      if (nekoPosY < 32) {
        avalibleIdleAnimations.push('scratchWallN');
      }
      if (nekoPosX > window.innerWidth - 32) {
        avalibleIdleAnimations.push('scratchWallE');
      }
      if (nekoPosY > window.innerHeight - 32) {
        avalibleIdleAnimations.push('scratchWallS');
      }
      idleAnimation =
        avalibleIdleAnimations[
          Math.floor(Math.random() * avalibleIdleAnimations.length)
        ];
    }

    switch (idleAnimation) {
      case 'sleeping':
        if (idleAnimationFrame < 8) {
          setSprite('tired', 0);
          break;
        }
        setSprite('sleeping', Math.floor(idleAnimationFrame / 4));
        if (idleAnimationFrame > 192) {
          resetIdleAnimation();
        }
        break;
      case 'scratchWallN':
      case 'scratchWallS':
      case 'scratchWallE':
      case 'scratchWallW':
      case 'scratchSelf':
        setSprite(idleAnimation, idleAnimationFrame);
        if (idleAnimationFrame > 9) {
          resetIdleAnimation();
        }
        break;
      default:
        setSprite('idle', 0);
        return;
    }
    idleAnimationFrame += 1;
  }

  function frame() {
    frameCount += 1;
    const diffX = nekoPosX - mousePosX;
    const diffY = nekoPosY - mousePosY;
    const distance = Math.sqrt(diffX ** 2 + diffY ** 2);

    if (distance < nekoSpeed || distance < 48) {
      idle();
      return;
    }

    idleAnimation = null;
    idleAnimationFrame = 0;

    if (idleTime > 1) {
      setSprite('alert', 0);
      // count down after being alerted before moving
      idleTime = Math.min(idleTime, 7);
      idleTime -= 1;
      return;
    }

    let direction;
    direction = diffY / distance > 0.5 ? 'N' : '';
    direction += diffY / distance < -0.5 ? 'S' : '';
    direction += diffX / distance > 0.5 ? 'W' : '';
    direction += diffX / distance < -0.5 ? 'E' : '';
    setSprite(direction, frameCount);

    nekoPosX -= (diffX / distance) * nekoSpeed;
    nekoPosY -= (diffY / distance) * nekoSpeed;

    nekoPosX = Math.min(Math.max(16, nekoPosX), window.innerWidth - 16);
    nekoPosY = Math.min(Math.max(16, nekoPosY), window.innerHeight - 16);

    nekoEl.style.left = `${nekoPosX - 16}px`;
    nekoEl.style.top = `${nekoPosY - 16}px`;
  }

  init();
})();

(function() {
  if (!REPLACEMENT_MAP.length) return;

  // Base styles (no hover rules – that goes in your main CSS)
  const baseStyle = document.createElement('style');
  baseStyle.textContent = `
    .unicode-icon {
      display: inline-block;
      width: 1.2em;
      height: 1.2em;
      vertical-align: middle;
      --icon-color: currentColor; /* fallback */
    }
    .unicode-icon svg {
      display: block;
      width: 100%;
      height: 100%;
    }
  `;
  document.head.appendChild(baseStyle);

  const charDataMap = new Map();
  for (const [char, svgOrUrl, color] of REPLACEMENT_MAP) {
    const isUrl = typeof svgOrUrl === 'string' && (svgOrUrl.startsWith('http') || svgOrUrl.startsWith('/') || svgOrUrl.startsWith('./'));
    charDataMap.set(char, {
      content: svgOrUrl,
      isUrl: isUrl,
      color: color || 'currentColor'
    });
  }

  function createIconElement(data) {
    const { content, isUrl, color } = data;
    const wrapper = document.createElement('span');
    wrapper.className = 'unicode-icon';
    // Set the custom property to the icon's fill color
    wrapper.style.setProperty('--icon-color', color);

    if (isUrl) {
      wrapper.setAttribute('data-svg-url', content);
      wrapper.setAttribute('data-svg-color', color);
      wrapper.textContent = ' ';
      loadExternalSvg(wrapper, content, color);
    } else {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = content;
      const svg = tempDiv.querySelector('svg');
      if (svg) {
        svg.style.fill = color;
        svg.setAttribute('fill', color);
        const shapes = svg.querySelectorAll('path, circle, rect, polygon, ellipse');
        shapes.forEach(shape => shape.setAttribute('fill', color));
      }
      wrapper.appendChild(tempDiv.firstChild);
    }

    return wrapper;
  }

  function loadExternalSvg(wrapper, url, color) {
    fetch(url)
      .then(response => response.text())
      .then(svgText => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = svgText;
        const svg = tempDiv.querySelector('svg');
        if (svg) {
          svg.style.fill = color;
          svg.setAttribute('fill', color);
          const shapes = svg.querySelectorAll('path, circle, rect, polygon, ellipse');
          shapes.forEach(shape => shape.setAttribute('fill', color));
          wrapper.innerHTML = '';
          wrapper.appendChild(svg);
        }
      })
      .catch(err => console.warn(`Failed to load SVG from ${url}`, err));
  }

  function processNode(node) {
    if (node.nodeType === Node.ELEMENT_NODE) {
      const tag = node.tagName;
      if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'TEXTAREA' || tag === 'NOSCRIPT') return;
    }

    if (node.nodeType === Node.TEXT_NODE) {
      const text = node.textContent;
      let hasMatch = false;
      for (const char of charDataMap.keys()) {
        if (text.includes(char)) { hasMatch = true; break; }
      }
      if (!hasMatch) return;

      const fragment = document.createDocumentFragment();
      let remaining = text;

      while (remaining.length) {
        let earliest = Infinity, matchedChar = '';
        for (const char of charDataMap.keys()) {
          const idx = remaining.indexOf(char);
          if (idx !== -1 && idx < earliest) { earliest = idx; matchedChar = char; }
        }

        if (earliest === Infinity) {
          fragment.appendChild(document.createTextNode(remaining));
          break;
        }

        if (earliest > 0) {
          fragment.appendChild(document.createTextNode(remaining.slice(0, earliest)));
        }

        const data = charDataMap.get(matchedChar);
        fragment.appendChild(createIconElement(data));
        remaining = remaining.slice(earliest + matchedChar.length);
      }

      node.parentNode.replaceChild(fragment, node);
      return;
    }

    for (const child of [...node.childNodes]) processNode(child);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => processNode(document.body));
  } else {
    processNode(document.body);
  }
